<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票走势预测系统 Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>基于因果发现与多模态融合的股票预测系统</h1>

      <section class="panel">
        <h2>模块 1：数据获取与入库</h2>
        <div class="controls">
          <label>
            股票代码
            <input id="symbolInput" type="text" value="AAPL" />
          </label>
          <label>
            开始日期
            <input id="startInput" type="date" />
          </label>
          <label>
            结束日期
            <input id="endInput" type="date" />
          </label>
          <label>
            新闻条数
            <input id="newsLimitInput" type="number" min="1" max="100" value="20" />
          </label>
          <label>
            训练集比例
            <input id="trainRatioInput" type="number" min="0.5" max="0.95" step="0.05" value="0.7" />
          </label>
        </div>
        <button id="fetchBtn">获取数据并存入数据库</button>
        <p id="fetchStatus" class="status-text">等待执行</p>
      </section>

      <section class="panel">
        <h2>模块 1.5：数据库数据管理</h2>
        <div class="row-actions">
          <button id="refreshDbBtn">查看当前数据库内容</button>
        </div>
        <p id="dbStatus" class="status-text">等待执行</p>
        <table id="dbTable" class="db-table">
          <thead>
            <tr>
              <th>股票代码</th>
              <th>行情条数</th>
              <th>新闻条数</th>
              <th>日期范围</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="dbTableBody">
            <tr>
              <td colspan="5">暂无数据</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="panel">
        <h2>模块 2：模型处理（占位）</h2>
        <button id="modelBtn">启动模型处理（暂未实现）</button>
        <p id="modelStatus" class="status-text">等待执行</p>
      </section>

      <section class="panel">
        <h2>模块 3：可视化与指标观察</h2>
        <button id="visualBtn">加载可视化结果</button>
        <p id="visualStatus" class="status-text">等待执行</p>
      </section>

      <section class="cards">
        <article class="card">
          <h2>最终预测（下一交易日）</h2>
          <p id="signalText">-</p>
          <p id="probText">-</p>
          <small id="reasonText">-</small>
        </article>
        <article class="card">
          <h2>数据切分信息</h2>
          <ul id="splitInfoList"></ul>
        </article>
      </section>

      <section class="cards">
        <article class="card">
          <h2>最近一次已实现对比</h2>
          <p id="latestCompareText">-</p>
          <small id="latestCompareMeta">-</small>
        </article>
        <article class="card">
          <h2>关键指标</h2>
          <ul id="indicatorList"></ul>
        </article>
      </section>

      <section class="panel">
        <h2>回测指标（预测 vs 实际）</h2>
        <div id="backtestMetrics" class="metrics-grid"></div>
      </section>

      <section class="panel">
        <h2>价格与技术指标图</h2>
        <div id="priceChart" class="chart"></div>
      </section>

      <section class="panel">
        <h2>回测收益对比图（策略 vs 基准）</h2>
        <div id="backtestChart" class="chart"></div>
      </section>

      <section class="panel">
        <h2>新闻列表</h2>
        <ul id="newsList"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
